{{- /* Local admin Secret — Kubernetes-native credentials (not shell exports) */ -}}
{{- $secretName := .Values.auth.local.existingSecret -}}
{{- if and .Values.auth.local.createSecret (eq $secretName "") }}
{{- $secretName = printf "%s-admin" (include "highland.fullname" .) -}}
{{- if not .Values.auth.local.password }}
{{- fail "auth.local.password is required when auth.local.createSecret=true (or set auth.local.existingSecret)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "highland.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.auth.local.username | default "admin" | quote }}
  password: {{ .Values.auth.local.password | quote }}
{{- end }}

{{- if and .Values.auth.oidc.createSecret .Values.auth.oidc.clientSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "highland.fullname" . }}-oidc
  labels:
    {{- include "highland.labels" . | nindent 4 }}
type: Opaque
stringData:
  clientSecret: {{ .Values.auth.oidc.clientSecret | quote }}
{{- end }}
