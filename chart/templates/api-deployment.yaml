{{- $adminSecret := .Values.auth.local.existingSecret -}}
{{- if and .Values.persistence.audit.enabled (gt (int .Values.replicaCount.api) 1) (ne .Values.persistence.audit.accessMode "ReadWriteMany") }}
{{- fail "persistence.audit.accessMode must be ReadWriteMany when replicaCount.api is greater than one" }}
{{- end }}
{{- if and .Values.auth.local.createSecret (eq $adminSecret "") }}
{{- $adminSecret = printf "%s-admin" (include "highland.fullname" .) -}}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "highland.fullname" . }}-api
  labels:
    {{- include "highland.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  {{- if and .Values.strategy .Values.strategy.api }}
  strategy:
    {{- toYaml .Values.strategy.api | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "highland.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "highland.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and .Values.metrics.enabled .Values.metrics.podAnnotations }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "highland.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext.api | nindent 8 }}
      containers:
        - name: highland-api
          image: {{ include "highland.apiImage" . | quote }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext.api | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: HIGHLAND_CONFIG_FILE
              value: /etc/highland/config.json
            # Credentials from Kubernetes Secret only (never chart ConfigMap)
            - name: HIGHLAND_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $adminSecret | required "auth.local.existingSecret or createSecret with password" }}
                  key: username
            - name: HIGHLAND_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $adminSecret }}
                  key: password
            # Stateless signed-cookie session key (stable across restarts/replicas)
            - name: HIGHLAND_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "highland.fullname" . }}-session
                  key: sessionSecret
            - name: HIGHLAND_IDENTITY_SECRET
              value: {{ printf "%s-identity" (include "highland.fullname" .) | quote }}
            {{- if or .Values.auth.oidc.existingSecret .Values.auth.oidc.createSecret }}
            - name: HIGHLAND_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.oidc.existingSecret | default (printf "%s-oidc" (include "highland.fullname" .)) }}
                  key: clientSecret
                  optional: true
            {{- end }}
            {{- if .Values.persistence.audit.enabled }}
            - name: HIGHLAND_AUDIT_FILE
              value: /var/log/highland/audit.jsonl
            {{- end }}
            {{- if and .Values.audit.postgres.enabled .Values.audit.postgres.existingSecret }}
            - name: HIGHLAND_AUDIT_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.audit.postgres.existingSecret | quote }}
                  key: {{ default "dsn" .Values.audit.postgres.secretKey | quote }}
            {{- end }}
            {{- if or .Values.audit.postgres.required .Values.persistence.audit.required }}
            - name: HIGHLAND_AUDIT_REQUIRED
              value: "true"
            {{- end }}
            {{- if and .Values.redis.enabled .Values.redis.addr }}
            - name: HIGHLAND_REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            - name: HIGHLAND_REDIS_DB
              value: {{ .Values.redis.db | quote }}
            {{- if .Values.redis.passwordSecret }}
            - name: HIGHLAND_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.passwordSecret }}
                  key: {{ .Values.redis.passwordKey }}
            {{- end }}
            # Shared login limiter reuses Redis in HA (ADR-0005). Fail closed unless override.
            - name: HIGHLAND_LOGIN_LIMITER_REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            {{- if .Values.redis.passwordSecret }}
            - name: HIGHLAND_LOGIN_LIMITER_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.passwordSecret }}
                  key: {{ .Values.redis.passwordKey }}
            {{- end }}
            - name: HIGHLAND_LOGIN_LIMITER_FAIL_OPEN
              value: {{ default false .Values.redis.loginLimiterFailOpen | quote }}
            {{- end }}
            - name: HIGHLAND_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HIGHLAND_LONGHORN_NAMESPACE
              value: {{ include "highland.longhornNamespace" . | quote }}
            {{- if and .Values.providers.linstor.enabled .Values.providers.linstor.controller.existingSecret }}
            - name: HIGHLAND_LINSTOR_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.providers.linstor.controller.existingSecret | quote }}
                  key: token
            {{- end }}
            {{- if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.existingSecret }}
            - name: HIGHLAND_ROOK_CEPH_DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.providers.rookCeph.dashboard.existingSecret | quote }}
                  key: username
            - name: HIGHLAND_ROOK_CEPH_DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.providers.rookCeph.dashboard.existingSecret | quote }}
                  key: password
            {{- end }}
            - name: HIGHLAND_ROOK_CEPH_CREDENTIAL_REVEAL_ENABLED
              value: {{ .Values.providers.rookCeph.dashboard.credentialReveal.enabled | quote }}
            - name: HIGHLAND_ROOK_CEPH_DASHBOARD_ADMIN_USERNAME
              value: {{ default "admin" .Values.providers.rookCeph.dashboard.credentialReveal.username | quote }}
            - name: HIGHLAND_ROOK_CEPH_DASHBOARD_ADMIN_SECRET
              value: {{ default "rook-ceph-dashboard-password" .Values.providers.rookCeph.dashboard.credentialReveal.secretName | quote }}
            - name: HIGHLAND_TRUSTED_PROXIES
              value: {{ .Values.config.trustedProxies | quote }}
            - name: HIGHLAND_FIO_IMAGE
              value: {{ include "highland.fioImage" . | quote }}
            - name: HIGHLAND_KUBERNETES_BENCHMARK_ENABLED
              value: {{ .Values.benchmark.kubernetesJobEnabled | quote }}
            - name: HIGHLAND_FIO_STORAGECLASS
              value: {{ .Values.benchmark.storageClass | quote }}
            - name: HIGHLAND_FIO_SIZE
              value: {{ .Values.benchmark.size | default "10Gi" | quote }}
            # Disable dev convenience accounts in-cluster
            - name: HIGHLAND_DEV_ROLES
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /etc/highland
              readOnly: true
            {{- if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.caSecret }}
            - name: ceph-dashboard-ca
              mountPath: /etc/highland/ceph-ca
              readOnly: true
            {{- end }}
            {{- if and .Values.providers.linstor.enabled .Values.providers.linstor.controller.caSecret }}
            - name: linstor-ca
              mountPath: /etc/highland/linstor-ca
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.audit.enabled }}
            - name: audit
              mountPath: /var/log/highland
            {{- else }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
          {{- if and .Values.startupProbe .Values.startupProbe.api .Values.startupProbe.api.enabled }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: {{ .Values.startupProbe.api.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.api.periodSeconds }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "highland.fullname" . }}-config
        {{- if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.caSecret }}
        - name: ceph-dashboard-ca
          secret:
            secretName: {{ .Values.providers.rookCeph.dashboard.caSecret | quote }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
        {{- if and .Values.providers.linstor.enabled .Values.providers.linstor.controller.caSecret }}
        - name: linstor-ca
          secret:
            secretName: {{ .Values.providers.linstor.controller.caSecret | quote }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
        {{- if .Values.persistence.audit.enabled }}
        - name: audit
          persistentVolumeClaim:
            claimName: {{ include "highland.fullname" . }}-audit
        {{- else }}
        - name: tmp
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $topo := include "highland.topologySpreadConstraints" (dict "root" . "component" "api") | trim -}}
      {{- if $topo }}
      topologySpreadConstraints:
        {{- $topo | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      {{- $anti := include "highland.podAntiAffinity" (dict "root" . "component" "api") | trim -}}
      {{- if $anti }}
      affinity:
        {{- $anti | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "highland.fullname" . }}-api
  labels:
    {{- include "highland.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.api.type }}
  ports:
    - port: {{ .Values.service.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "highland.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
