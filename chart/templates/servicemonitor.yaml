{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled }}
# Prometheus Operator ServiceMonitor for the BFF's /metrics endpoint. Requires
# the monitoring.coreos.com CRDs; guarded off by default so a plain Prometheus
# (annotation-based) install still works via the pod annotations.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "highland.fullname" . }}-api
  {{- with .Values.metrics.serviceMonitor.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "highland.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "highland.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: {{ .Values.metrics.path | quote }}
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
      scheme: http
{{- end }}
