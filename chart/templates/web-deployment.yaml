apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "highland.fullname" . }}-web
  labels:
    {{- include "highland.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount.web }}
  {{- if and .Values.strategy .Values.strategy.web }}
  strategy:
    {{- toYaml .Values.strategy.web | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "highland.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "highland.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: web
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext.web | nindent 8 }}
      containers:
        - name: highland-web
          image: {{ include "highland.webImage" . | quote }}
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext.web | nindent 12 }}
          env:
            # nginx template: proxy SPA /auth /api → in-cluster API Service
            - name: HIGHLAND_API_UPSTREAM
              value: {{ printf "%s-api:%v" (include "highland.fullname" .) .Values.service.api.port | quote }}
            - name: HIGHLAND_CEPH_DASHBOARD_UPSTREAM
              value: {{ if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.url }}{{ printf "rook-ceph-mgr-dashboard.%s.svc:%v" .Values.providers.rookCeph.namespace .Values.providers.rookCeph.dashboard.port | quote }}{{ else }}"127.0.0.1:9"{{ end }}
            - name: HIGHLAND_CEPH_DASHBOARD_TLS_NAME
              value: {{ if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.url }}{{ printf "rook-ceph-mgr-dashboard.%s.svc" .Values.providers.rookCeph.namespace | quote }}{{ else }}"localhost"{{ end }}
            - name: HIGHLAND_CEPH_DASHBOARD_CA_FILE
              value: {{ if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.caSecret }}"/etc/highland/ceph-ca/ca.crt"{{ else }}"/etc/ssl/certs/ca-certificates.crt"{{ end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.web | nindent 12 }}
          {{- if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.caSecret }}
          volumeMounts:
            - name: ceph-dashboard-ca
              mountPath: /etc/highland/ceph-ca
              readOnly: true
          {{- end }}
      {{- if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.caSecret }}
      volumes:
        - name: ceph-dashboard-ca
          secret:
            secretName: {{ .Values.providers.rookCeph.dashboard.caSecret | quote }}
            items:
              - key: ca.crt
                path: ca.crt
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $topo := include "highland.topologySpreadConstraints" (dict "root" . "component" "web") | trim -}}
      {{- if $topo }}
      topologySpreadConstraints:
        {{- $topo | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      {{- $anti := include "highland.podAntiAffinity" (dict "root" . "component" "web") | trim -}}
      {{- if $anti }}
      affinity:
        {{- $anti | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "highland.fullname" . }}-web
  labels:
    {{- include "highland.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "highland.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
