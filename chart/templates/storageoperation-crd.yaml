{{- if .Values.storage.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: storageoperations.highland.io
  labels:
    {{- include "highland.labels" . | nindent 4 }}
spec:
  group: highland.io
  scope: Namespaced
  names:
    plural: storageoperations
    singular: storageoperation
    kind: StorageOperation
    shortNames: [stop]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Action
          type: string
          jsonPath: .spec.actionId
        - name: Target
          type: string
          jsonPath: .spec.target.name
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              x-kubernetes-validations:
                - rule: self == oldSelf
                  message: StorageOperation spec is immutable
              required: [actionId, target, parameterHash, planHash, resources, requester, requesterRole, requestedAt]
              properties:
                actionId:
                  type: string
                  enum:
                    - create-pvc
                    - expand-pvc
                    - create-snapshot
                    - restore-snapshot
                    - clone-pvc
                    - delete-snapshot
                    - delete-pvc
                    - create-ceph-rbd-storageclass
                    - create-cephfs-storageclass
                    - delete-ceph-storageclass
                    - create-ceph-blockpool
                    - delete-ceph-blockpool
                providerId: { type: string, maxLength: 128 }
                parameterHash: { type: string, minLength: 64, maxLength: 64 }
                planHash: { type: string, minLength: 64, maxLength: 64 }
                idempotencyHash: { type: string, minLength: 64, maxLength: 64 }
                requester: { type: string, maxLength: 253 }
                requesterRole: { type: string, enum: [viewer, operator, admin] }
                requestedAt: { type: string, format: date-time }
                target:
                  type: object
                  required: [kind, name]
                  properties:
                    apiVersion: { type: string, maxLength: 128 }
                    kind: { type: string, maxLength: 128 }
                    namespace: { type: string, maxLength: 253 }
                    name: { type: string, maxLength: 253 }
                    uid: { type: string, maxLength: 128 }
                    resourceVersion: { type: string, maxLength: 128 }
                parameters:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                resources:
                  type: array
                  minItems: 1
                  maxItems: 1
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                dependencies:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
{{- end }}
