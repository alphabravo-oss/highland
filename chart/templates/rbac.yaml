# Allow highland-api to create fio Jobs for benchmarks (in-cluster)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "highland.fullname" . }}-benchmark
  labels:
    {{- include "highland.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  # Provision/teardown the Longhorn-backed PVC the fio Job benchmarks
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]
  # Persist benchmark records as ConfigMaps (durable, kubectl-visible)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "highland.fullname" . }}-benchmark
  labels:
    {{- include "highland.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "highland.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "highland.fullname" . }}-benchmark
---
# Read-only access in the Longhorn namespace to report the Longhorn version
# (longhorn-manager DaemonSet image tag) on the Status page.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "highland.fullname" . }}-longhorn-read
  namespace: {{ .Values.longhorn.namespace }}
  labels:
    {{- include "highland.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments"]
    verbs: ["get", "list"]
  # Backup-setup wizard: create/update the backup-target credential Secret
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
  # Real-time SSE: watch Longhorn CRDs so UI updates without polling.
  - apiGroups: ["longhorn.io"]
    resources: ["volumes", "engines", "replicas", "nodes"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "highland.fullname" . }}-longhorn-read
  namespace: {{ .Values.longhorn.namespace }}
  labels:
    {{- include "highland.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "highland.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "highland.fullname" . }}-longhorn-read
