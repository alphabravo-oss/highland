  - apiGroups: ["highland.io"]
    resources: ["storageoperations"]
    # Delete is required by the elected controller's terminal-object retention
    # job. Audit records are stored separately and are never deleted here.
    verbs: ["get", "list", "watch", "delete"{{ if $operationCreate }}, "create"{{ end }}]
  - apiGroups: ["highland.io"]
    resources: ["storageoperations/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["highland-storage-operations"]
    verbs: ["get", "update", "patch"]
  # A create request cannot be constrained by resourceNames. This Role is in
  # Highland's own namespace; all subsequent lease access is name-scoped.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
