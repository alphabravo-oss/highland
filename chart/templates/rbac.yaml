{{- if eq (include "highland.longhornEnabled" .) "true" }}
# Read-only access in the Longhorn namespace to report the Longhorn version
# (longhorn-manager DaemonSet image tag) on the Status page.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "highland.fullname" . }}-longhorn-read
  namespace: {{ include "highland.longhornNamespace" . }}
  labels:
    {{- include "highland.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments"]
    verbs: ["get", "list"]
  # Backup-setup wizard: create/update the backup-target credential Secret
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
  # Real-time SSE: watch Longhorn CRDs so UI updates without polling.
  - apiGroups: ["longhorn.io"]
    resources:
      - volumes
      - engines
      - replicas
      - volumeattachments
      - nodes
      - backupvolumes
      - backups
      - backuptargets
      - engineimages
      - backingimages
      - backupbackingimages
      - settings
      - recurringjobs
      - instancemanagers
      - orphans
      - systembackups
      - systemrestores
      - supportbundles
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "highland.fullname" . }}-longhorn-read
  namespace: {{ include "highland.longhornNamespace" . }}
  labels:
    {{- include "highland.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "highland.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "highland.fullname" . }}-longhorn-read
{{- end }}
