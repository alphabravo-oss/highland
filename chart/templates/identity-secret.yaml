{{- $name := printf "%s-identity" (include "highland.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $identity := dict "version" 1 "policy" (dict "minimumPasswordLength" 15 "maximumPasswordLength" 128 "passwordHistory" 5 "blockCommonPasswords" true "mfaMode" "optional") "users" (list) | toJson | b64enc -}}
{{- if and $existing $existing.data (index $existing.data "identity.json") -}}
{{- $identity = index $existing.data "identity.json" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "highland.labels" . | nindent 4 }}
type: Opaque
data:
  # API writes use optimistic resourceVersion concurrency. TOTP seeds are
  # additionally encrypted with the stable session key before persistence.
  identity.json: {{ $identity }}
