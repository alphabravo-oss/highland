{{- $name := printf "%s-session" (include "highland.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $secret := "" -}}
{{- if and $existing $existing.data -}}
{{- $secret = index $existing.data "sessionSecret" -}}
{{- else if .Values.config.sessionSecret -}}
{{- $secret = .Values.config.sessionSecret | b64enc -}}
{{- else -}}
{{- $secret = randAlphaNum 48 | b64enc -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  annotations:
    # The identity Secret encrypts TOTP seeds with this stable key. Retain both
    # across uninstall/reinstall so accounts remain recoverable.
    helm.sh/resource-policy: keep
  labels:
    {{- include "highland.labels" . | nindent 4 }}
type: Opaque
data:
  # Stable across upgrades (reused via lookup) so signed-cookie sessions survive.
  sessionSecret: {{ $secret }}
