{{- if and .Values.networkPolicy.enabled (empty .Values.networkPolicy.kubernetesApiCIDRs) }}
{{- fail "networkPolicy.kubernetesApiCIDRs must contain at least one Kubernetes API CIDR when NetworkPolicy is enabled" }}
{{- end }}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "highland.fullname" . }}-api-egress
  labels:
    {{- include "highland.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "highland.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if eq (include "highland.longhornEnabled" .) "true" }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "highland.longhornNamespace" . }}
      ports:
        - protocol: TCP
          port: {{ .Values.longhorn.managerPort }}
    {{- end }}
    {{- if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.url }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.providers.rookCeph.namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.providers.rookCeph.dashboard.port }}
    {{- end }}
    {{- if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.prometheus.url }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ default .Values.providers.rookCeph.namespace .Values.providers.rookCeph.prometheus.namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.providers.rookCeph.prometheus.port }}
    {{- end }}
    - to:
        {{- range .Values.networkPolicy.kubernetesApiCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- if and .Values.redis.enabled .Values.redis.addr }}
    # Session/OIDC-state store
    - ports:
        - protocol: TCP
          port: 6379
    {{- end }}
---
# Web egress is normally unrestricted because the ingress-only policy above
# does not select Egress. When the Ceph gateway is enabled, make its required
# DNS and dashboard destinations explicit.
{{- if and .Values.providers.rookCeph.enabled .Values.providers.rookCeph.dashboard.url }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "highland.fullname" . }}-web-egress
  labels:
    {{- include "highland.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "highland.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "highland.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: {{ .Values.service.api.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.providers.rookCeph.namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.providers.rookCeph.dashboard.port }}
---
{{- end }}
# Optional: only web pods may receive traffic from Ingress controllers (operator can tighten)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "highland.fullname" . }}-web-ingress
  labels:
    {{- include "highland.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "highland.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          # must match the web container port (nginx-unprivileged listens on 8080)
          port: 8080
{{- if and .Values.metrics.enabled .Values.metrics.networkPolicy.enabled }}
---
# Ingress policy for the API pods. Until now the api pods had NO ingress policy,
# so all ingress was default-allowed. Adding one lets us keep scraping/probes
# working while making the allowed sources explicit.
#
# The API port is opened with NO `from` filter (matching the web-ingress policy
# above). This is deliberate: kubelet liveness/readiness probes originate from
# the node IP, which cannot be expressed as a pod/namespace selector — a
# `from`-scoped rule would silently break health checks on enforcing CNIs
# (e.g. Calico). An unfiltered port rule still confines ingress to :8080 and to
# the api pod selector, and admits Prometheus, the web sidecar, and probes alike.
# Narrow *which* Prometheus may scrape at the ServiceMonitor/Prometheus selector
# layer instead.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "highland.fullname" . }}-api-ingress
  labels:
    {{- include "highland.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "highland.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          # API + /metrics scrape port (matches containerPort http).
          port: 8080
{{- end }}
{{- end }}
