{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "highland.fullname" . }}-api-egress
  labels:
    {{- include "highland.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "highland.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.longhorn.namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.longhorn.managerPort }}
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- if and .Values.redis.enabled .Values.redis.addr }}
    # Session/OIDC-state store
    - ports:
        - protocol: TCP
          port: 6379
    {{- end }}
---
# Optional: only web pods may receive traffic from Ingress controllers (operator can tighten)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "highland.fullname" . }}-web-ingress
  labels:
    {{- include "highland.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "highland.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          # must match the web container port (nginx-unprivileged listens on 8080)
          port: 8080
{{- end }}
