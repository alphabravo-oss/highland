apiVersion: v1
kind: Namespace
metadata:
  name: highland-openebs-smoke
  labels:
    app.kubernetes.io/part-of: highland-storage-lab
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openebs-hostpath-smoke
  namespace: highland-openebs-smoke
  labels:
    app.kubernetes.io/part-of: highland-storage-lab
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openebs-hostpath-smoke
  namespace: highland-openebs-smoke
  labels:
    app.kubernetes.io/part-of: highland-storage-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openebs-hostpath-smoke
  template:
    metadata:
      labels:
        app: openebs-hostpath-smoke
        app.kubernetes.io/part-of: highland-storage-lab
    spec:
      containers:
        - name: writer
          image: busybox:1.37
          command:
            - sh
            - -c
            - while true; do date -u +%FT%TZ >> /data/heartbeat; sleep 30; done
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openebs-hostpath-smoke
