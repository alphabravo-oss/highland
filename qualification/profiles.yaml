# Highland qualification profiles (Workstream C scaffolding).
# Linked from docs/compatibility.yaml via validation.qualificationProfiles.
schemaVersion: 1
profiles:
  - id: generic-csi-kind
    provider: generic-csi
    gate: pr
    environmentClass: kind
    versionSelectors:
      kubernetes: "1.34-1.36"
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.4
      - QA-C4.5
      - QA-C4.7
      - QA-C4.8
      - QA-C4.14
    timeout: 30m
    cleanupRequired: true
    destructiveRisk: none
    promoted: true
    notes: "PR smoke: provider-neutral CSI discovery and graceful optional-API absence on kind."

  - id: longhorn-current
    provider: longhorn
    gate: production
    environmentClass: disposable-vm
    versionSelectors:
      kubernetes: "1.35.x"
      longhorn: "1.12.x"
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.4
      - QA-C4.5
      - QA-C4.6
      - QA-C4.7
      - QA-C4.8
      - QA-C4.9
      - QA-C4.10
      - QA-C4.11
      - QA-C4.12
      - QA-C4.14
    timeout: 90m
    cleanupRequired: true
    destructiveRisk: disposable-only
    promoted: true
    notes: "Current supported Longhorn minor; production release gate."

  - id: longhorn-previous
    provider: longhorn
    gate: nightly
    environmentClass: disposable-vm
    versionSelectors:
      kubernetes: "1.34.x"
      longhorn: "1.11.x"
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.4
      - QA-C4.5
      - QA-C4.7
      - QA-C4.8
      - QA-C4.11
      - QA-C4.14
    timeout: 90m
    cleanupRequired: true
    destructiveRisk: disposable-only
    promoted: true
    notes: "Previous supported Longhorn minor; nightly compatibility health."

  - id: rook-ceph-current
    provider: rook-ceph
    gate: preview
    environmentClass: self-hosted-lab
    versionSelectors:
      kubernetes: "1.34.x|1.35.x"
      rook: "1.20.2"
      cephCsi: "3.16.2"
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.4
      - QA-C4.5
      - QA-C4.6
      - QA-C4.7
      - QA-C4.8
      - QA-C4.9
      - QA-C4.10
      - QA-C4.11
      - QA-C4.14
    timeout: 90m
    cleanupRequired: true
    destructiveRisk: disposable-only
    promoted: true
    notes: "Current Rook line disposable three-node lab; preview release gate."

  - id: rook-ceph-previous
    provider: rook-ceph
    gate: nightly
    environmentClass: self-hosted-lab
    versionSelectors:
      kubernetes: "1.34.x|1.35.x"
      rook: "1.19.6"
      cephCsi: "3.16.2"
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.4
      - QA-C4.5
      - QA-C4.7
      - QA-C4.8
      - QA-C4.11
      - QA-C4.14
    timeout: 90m
    cleanupRequired: true
    destructiveRisk: disposable-only
    promoted: true
    notes: "Previous maintained Rook line; nightly health."

  - id: openebs-hostpath
    provider: openebs
    gate: nightly
    environmentClass: disposable-vm
    versionSelectors:
      kubernetes: "1.35.x"
      openebs: "4.5.1"
      engine: hostpath
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.4
      - QA-C4.5
      - QA-C4.7
      - QA-C4.8
      - QA-C4.10
      - QA-C4.11
      - QA-C4.14
    timeout: 60m
    cleanupRequired: true
    destructiveRisk: disposable-only
    promoted: true
    notes: "OpenEBS HostPath live single-node lab; non-replicated storage."

  - id: openebs-mayastor
    provider: openebs
    gate: preview
    environmentClass: self-hosted-lab
    versionSelectors:
      kubernetes: "1.35.x"
      openebs: "4.5.1"
      engine: mayastor
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.4
      - QA-C4.5
      - QA-C4.7
      - QA-C4.8
      - QA-C4.11
      - QA-C4.14
    timeout: 120m
    cleanupRequired: true
    destructiveRisk: disposable-only
    promoted: false
    notes: "Mayastor discovery/three-node profile; not promoted until infrastructure gates pass."

  - id: linstor-single-node
    provider: linstor
    gate: preview
    environmentClass: disposable-vm
    versionSelectors:
      kubernetes: "1.36.x"
      piraeusOperator: "2.10.8"
      topology: single-node-file-thin
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.4
      - QA-C4.5
      - QA-C4.7
      - QA-C4.8
      - QA-C4.10
      - QA-C4.11
      - QA-C4.14
    timeout: 60m
    cleanupRequired: true
    destructiveRisk: disposable-only
    promoted: true
    notes: "LINSTOR single-node file-thin validation path."

  - id: linstor-drbd
    provider: linstor
    gate: production
    environmentClass: self-hosted-lab
    versionSelectors:
      kubernetes: "1.36.x"
      piraeusOperator: "2.10.8"
      topology: three-node-drbd-quorum
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.4
      - QA-C4.5
      - QA-C4.6
      - QA-C4.7
      - QA-C4.8
      - QA-C4.9
      - QA-C4.10
      - QA-C4.11
      - QA-C4.12
      - QA-C4.14
    timeout: 120m
    cleanupRequired: true
    destructiveRisk: disposable-only
    promoted: true
    notes: "Three-node DRBD quorum production release gate."

  - id: ha-multi-replica
    provider: highland
    gate: production
    environmentClass: self-hosted-lab
    versionSelectors:
      kubernetes: "1.34-1.36"
      replicas: ">=2"
    requiredAssertions:
      - QA-C4.1
      - QA-C4.2
      - QA-C4.3
      - QA-C4.7
      - QA-C4.8
      - QA-C4.11
      - QA-C4.12
      - QA-C4.13
      - QA-C4.14
    timeout: 90m
    cleanupRequired: true
    destructiveRisk: ha-disruption
    promoted: true
    notes: "Multi-replica HA disruption, session/audit convergence, and rollout readiness."
