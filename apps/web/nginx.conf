# Highland web — same pattern as longhorn-ui: SPA + reverse proxy to API (not manager)
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    client_max_body_size 0;
    proxy_request_buffering off;

    # Highland BFF only — browser never talks to longhorn-backend
    location /auth/ {
        proxy_pass http://${HIGHLAND_API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://${HIGHLAND_API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /healthz {
        proxy_pass http://${HIGHLAND_API_UPSTREAM}/healthz;
    }

    location /readyz {
        proxy_pass http://${HIGHLAND_API_UPSTREAM}/readyz;
    }

    # Content-hashed build assets are immutable — cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA shell must never be cached, so new deploys are picked up immediately.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
