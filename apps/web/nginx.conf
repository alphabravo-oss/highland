map $scheme $ceph_dashboard_cookie_flag {
    http nosecure;
    https secure;
}

# Highland web — same pattern as longhorn-ui: SPA + reverse proxy to API (not manager)
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    client_max_body_size 0;
    proxy_request_buffering off;
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Highland BFF only — browser never talks to longhorn-backend.
    # NOTE: security headers for /auth and /api come from the BFF itself; we do
    # NOT add them here to avoid duplicate headers on proxied responses.
    location /auth/ {
        proxy_pass http://${HIGHLAND_API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Server-Sent Events change stream — must NOT buffer, and needs a long read
    # timeout. Exact-match (=) wins over the /api/ prefix below.
    location = /api/v1/events/stream {
        proxy_pass http://${HIGHLAND_API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://${HIGHLAND_API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Authenticate the Ceph browser gateway with Highland's existing session.
    # The subrequest has no body and never forwards Ceph credentials.
    location = /_highland_ceph_auth {
        internal;
        proxy_pass http://${HIGHLAND_API_UPSTREAM}/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }

    # Ceph Dashboard remains ClusterIP-only. Ceph's mgr/dashboard/url_prefix is
    # configured to match this path so its SPA assets, API calls, and redirects
    # all stay behind Highland's same-origin authenticated gateway.
    location /ceph-dashboard/ {
        auth_request /_highland_ceph_auth;
        proxy_pass https://${HIGHLAND_CEPH_DASHBOARD_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host ${HIGHLAND_CEPH_DASHBOARD_TLS_NAME};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ceph-dashboard;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_server_name on;
        proxy_ssl_name ${HIGHLAND_CEPH_DASHBOARD_TLS_NAME};
        proxy_ssl_trusted_certificate ${HIGHLAND_CEPH_DASHBOARD_CA_FILE};
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        # Ceph issues its JWT as a cookie for /. Scope it to the gateway so it
        # is never sent to Highland routes, and retain Secure on HTTPS while
        # allowing an explicitly HTTP-served local lab to authenticate.
        proxy_cookie_path / /ceph-dashboard/;
        proxy_cookie_flags token httponly samesite=strict $ceph_dashboard_cookie_flag;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /healthz {
        proxy_pass http://${HIGHLAND_API_UPSTREAM}/healthz;
    }

    location /readyz {
        proxy_pass http://${HIGHLAND_API_UPSTREAM}/readyz;
    }

    # Content-hashed build assets are immutable — cache hard. Security headers
    # are repeated here because nginx add_header does NOT inherit into a location
    # that defines its own add_header (this block sets Cache-Control).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        try_files $uri =404;
    }

    # SPA shell must never be cached, so new deploys are picked up immediately.
    # The CSP here governs the app document the browser enforces. The script-src
    # sha256 covers the inline theme-init script in index.html — if that script
    # changes, recompute the hash (the vitest guard in csp.test.ts enforces this)
    # or theme init is blocked under enforcement.
    location / {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-CKQIqxn35hm4kYV00xXJORIqXZtvDLZSDcVUuSLfSBw='; connect-src 'self'" always;
        try_files $uri $uri/ /index.html;
    }
}
