name: Publish images

# Build the API and web container images and push them to GitHub Container
# Registry (ghcr.io/<owner>/highland-{api,web}). Runs on every push to main
# (tags: `edge`, `latest`, and the commit SHA) and on semver tags `v*`
# (tags: full/minor semver + `latest`).
#
# Supply-chain notes (ADR-0006 / docs/security/supply-chain-policy.md):
# - Build once, promote by digest: the `images` job is the single build of each
#   artifact for a given git ref. Downstream consumers (chart, environments)
#   should pin `image@sha256:…` from this job rather than rebuilding the same
#   version in a later workflow.
# - SBOM and Cosign steps below are scaffolded and conditional so the existing
#   GHCR publish path remains reliable without OIDC / extra tools.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Required for Cosign keyless signing via GitHub OIDC (when signing is enabled).
  id-token: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  images:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: highland-api
            context: apps/api
          - image: highland-web
            context: apps/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        id: push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Multi-arch (amd64 + emulated arm64) only for tagged releases — arm64
          # under QEMU is slow, so day-to-day main pushes build amd64 `edge` only.
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- SBOM (best-effort) -------------------------------------------------
      # Prefer syft / anchore sbom-action when available. Does not fail the
      # publish path if the tool is missing or the step is skipped.
      - name: Generate SBOM (syft, best-effort)
        if: success() && steps.push.outputs.digest != ''
        continue-on-error: true
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          if ! command -v syft >/dev/null 2>&1; then
            # Best-effort install; skip quietly if network/tooling fails.
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
              | sh -s -- -b /usr/local/bin 2>/dev/null || {
                echo "syft not available; skipping SBOM generation"
                exit 0
              }
          fi
          mkdir -p sbom
          syft "$IMAGE_REF" -o spdx-json="sbom/${{ matrix.image }}.spdx.json" || {
            echo "syft scan failed; continuing without SBOM artifact"
            exit 0
          }
          echo "SBOM written for $IMAGE_REF"

      - name: Upload SBOM artifact
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.image }}
          path: sbom/
          if-no-files-found: ignore
          retention-days: 30

      # --- Cosign keyless sign (disabled until OIDC/registry policy ready) ----
      # Env / permissions required when enabled:
      #   permissions: id-token: write, packages: write
      #   Registry must accept the GitHub OIDC identity for this repo.
      #   No COSIGN_PRIVATE_KEY needed for keyless mode.
      # Flip `if` to: success() && steps.push.outputs.digest != ''
      # after package/OIDC trust is configured, or gate on a repository variable.
      - name: Install Cosign
        if: ${{ false }}
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Cosign sign (keyless)
        if: ${{ false }}
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "$IMAGE_REF"

      - name: Record digest for promote-by-digest
        if: success() && steps.push.outputs.digest != ''
        run: |
          echo "Built ${{ matrix.image }} digest: ${{ steps.push.outputs.digest }}"
          echo "Promote this digest (do not rebuild the same version elsewhere)."
          echo "image=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.push.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

  chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: images
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Add Longhorn chart repository
        run: helm repo add longhorn https://charts.longhorn.io
      - name: Package & push chart to GHCR (OCI)
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u '${{ github.actor }}' --password-stdin
          helm dependency build ./chart
          helm package ./chart --version "$version" --app-version "$version"
          tar -tzf "highland-${version}.tgz" | grep -Fx 'highland/charts/longhorn/Chart.yaml' >/dev/null
          helm push "highland-${version}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
