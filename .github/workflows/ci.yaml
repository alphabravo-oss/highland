name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum
      - name: Test
        run: go test ./... -count=1
      - name: Build
        run: |
          go build -o /tmp/highland-api ./cmd/highland-api
          go build -o /tmp/mock-longhorn-manager ./cmd/mock-longhorn-manager
      - name: Disabled-provider process smoke
        working-directory: .
        run: ./hack/test-api-disabled-providers.sh

  web:
    name: Web (typecheck, unit, build, storybook)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Lint storage OpenAPI contract
        working-directory: .
        run: npx --yes @redocly/cli@2.18.0 lint docs/openapi/storage-v1.yaml --config redocly.yaml
      - name: Build Storybook
        run: npm run build-storybook
      - uses: actions/upload-artifact@v7
        if: success()
        with:
          name: storybook-static
          path: apps/web/storybook-static
          retention-days: 7

  e2e:
    name: Playwright Phase 1 smoke + a11y
    runs-on: ubuntu-latest
    needs: [api, web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E (mock manager + API + Vite)
        env:
          CI: true
          HIGHLAND_ADMIN_USER: admin
          HIGHLAND_ADMIN_PASSWORD: highland
        run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7

  chart:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v3.14.4
      - name: Add Longhorn chart repository
        run: helm repo add longhorn https://charts.longhorn.io
      - name: Build chart dependencies
        run: helm dependency build ./chart
      - name: Lint & template
        env:
          SKIP_DEPENDENCY_BUILD: "1"
        run: ./hack/test-chart.sh

  parity:
    name: Parity matrix gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check P0 rows
        run: ./hack/check-parity.sh
