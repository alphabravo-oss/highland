name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: apps/api/go.sum
      - name: Test
        run: go test ./... -count=1
      - name: Build
        run: |
          go build -o /tmp/highland-api ./cmd/highland-api
          go build -o /tmp/mock-longhorn-manager ./cmd/mock-longhorn-manager

  web:
    name: Web (typecheck, unit, build, storybook)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Build Storybook
        run: npm run build-storybook
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: storybook-static
          path: apps/web/storybook-static
          retention-days: 7

  e2e:
    name: Playwright Phase 1 smoke + a11y
    runs-on: ubuntu-latest
    needs: [api, web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: apps/api/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E (mock manager + API + Vite)
        env:
          CI: true
          HIGHLAND_ADMIN_USER: admin
          HIGHLAND_ADMIN_PASSWORD: highland
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7

  chart:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Lint & template
        run: |
          helm lint ./chart
          helm template highland ./chart --namespace highland-system \
            --set auth.local.createSecret=true --set auth.local.password=ci-test >/dev/null

  parity:
    name: Parity matrix gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check P0 rows
        run: ./hack/check-parity.sh
