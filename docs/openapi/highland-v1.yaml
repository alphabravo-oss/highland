  /auth/oidc/start:
    $ref: ./paths/auth-extra.yaml#/~1auth~1oidc~1start
  /auth/oidc/callback:
    $ref: ./paths/auth-extra.yaml#/~1auth~1oidc~1callback
  /auth/oidc/mock:
    $ref: ./paths/auth-extra.yaml#/~1auth~1oidc~1mock

  # --- Account / users / admin ---
  /api/v1/account:
    $ref: ./paths/account.yaml#/~1api~1v1~1account
  /api/v1/account/password:
    $ref: ./paths/account.yaml#/~1api~1v1~1account~1password
  /api/v1/account/email:
    $ref: ./paths/account.yaml#/~1api~1v1~1account~1email
  /api/v1/account/mfa/enroll:
    $ref: ./paths/account.yaml#/~1api~1v1~1account~1mfa~1enroll
  /api/v1/account/mfa/confirm:
    $ref: ./paths/account.yaml#/~1api~1v1~1account~1mfa~1confirm
  /api/v1/account/mfa:
    $ref: ./paths/account.yaml#/~1api~1v1~1account~1mfa
  /api/v1/users:
    $ref: ./paths/users.yaml#/~1api~1v1~1users
  /api/v1/users/{username}:
    $ref: ./paths/users.yaml#/~1api~1v1~1users~1{username}
  /api/v1/auth/security-policy:
    $ref: ./paths/admin.yaml#/~1api~1v1~1auth~1security-policy
  /api/v1/auth/oidc-config:
    $ref: ./paths/admin.yaml#/~1api~1v1~1auth~1oidc-config
  /api/v1/admin/providers/rook-ceph/dashboard-credential/reveal:
    $ref: ./paths/admin.yaml#/~1api~1v1~1admin~1providers~1rook-ceph~1dashboard-credential~1reveal

  # --- Platform / benchmarks ---
  /api/v1/compatibility:
    $ref: ./paths/platform.yaml#/~1api~1v1~1compatibility
  /api/v1/health:
    $ref: ./paths/platform.yaml#/~1api~1v1~1health
  /api/v1/preflight:
    $ref: ./paths/platform.yaml#/~1api~1v1~1preflight
  /api/v1/dashboard:
    $ref: ./paths/platform.yaml#/~1api~1v1~1dashboard
  /api/v1/capacity:
    $ref: ./paths/platform.yaml#/~1api~1v1~1capacity
  /api/v1/volumes/{name}/metrics:
    $ref: ./paths/platform.yaml#/~1api~1v1~1volumes~1{name}~1metrics
  /api/v1/events/stream:
    $ref: ./paths/platform.yaml#/~1api~1v1~1events~1stream
  /api/v1/backup-credential:
    $ref: ./paths/platform.yaml#/~1api~1v1~1backup-credential
  /api/v1/benchmarks:
    $ref: ./paths/benchmarks.yaml#/~1api~1v1~1benchmarks
  /api/v1/benchmarks/{name}:
    $ref: ./paths/benchmarks.yaml#/~1api~1v1~1benchmarks~1{name}
  /api/v1/providers/{providerId}/longhorn/operations/{actionId}:
    $ref: ./paths/operations-extra.yaml#/~1api~1v1~1providers~1{providerId}~1longhorn~1operations~1{actionId}

  # --- Audit ---
  /api/v1/audit:
    $ref: ./paths/audit.yaml#/~1api~1v1~1audit

  # --- Storage control plane (re-exported from storage-v1.yaml) ---
  /api/v1/admin/storage-policy:
