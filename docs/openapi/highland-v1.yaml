components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: highland_session
  parameters:
    Csrf:
      $ref: ./schemas/parameters.yaml#/Csrf
    Limit:
      $ref: ./schemas/parameters.yaml#/Limit
  responses:
    Error:
      $ref: ./schemas/errors.yaml#/ErrorResponse
  schemas:
    APIError:
      $ref: ./schemas/errors.yaml#/APIError
    ErrorEnvelope:
      $ref: ./schemas/errors.yaml#/ErrorEnvelope
    SimpleError:
      $ref: ./schemas/errors.yaml#/SimpleError
    HealthzResponse:
      $ref: ./schemas/common.yaml#/HealthzResponse
    ReadyzResponse:
      $ref: ./schemas/common.yaml#/ReadyzResponse
    StatusResponse:
      $ref: ./schemas/common.yaml#/StatusResponse
    Role:
      $ref: ./schemas/common.yaml#/Role
    User:
      $ref: ./schemas/common.yaml#/User
    AuthProvidersResponse:
      $ref: ./schemas/common.yaml#/AuthProvidersResponse
    LoginRequest:
      $ref: ./schemas/common.yaml#/LoginRequest
    LoginSuccessResponse:
      $ref: ./schemas/common.yaml#/LoginSuccessResponse
    MFARequiredResponse:
      $ref: ./schemas/common.yaml#/MFARequiredResponse
    LogoutResponse:
      $ref: ./schemas/common.yaml#/LogoutResponse
    MeResponse:
      $ref: ./schemas/common.yaml#/MeResponse
    AuditEvent:
      $ref: ./schemas/common.yaml#/AuditEvent
    AuditListResponse:
      $ref: ./schemas/common.yaml#/AuditListResponse
    # Pull storage schemas through so bundlers/generators resolve storage $refs
    # when consuming highland-v1 alone. storage-v1 remains the authoring source.
    StorageAPIError:
      $ref: ./storage-v1.yaml#/components/schemas/APIError
    StorageErrorEnvelope:
      $ref: ./storage-v1.yaml#/components/schemas/ErrorEnvelope
