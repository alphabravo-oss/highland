openapi: 3.1.0
info:
  title: Highland API
  version: 0.4.0-preview
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  description: >
    Root OpenAPI 3.1 contract for the Highland public HTTP surface. Modular path
    and schema fragments live under docs/openapi/{paths,schemas}/. The storage
    control-plane remains fully specified in storage-v1.yaml and is composed
    here via $ref so both documents stay independently lintable.

    Public surface (ADR-0007 / DEC-12): /auth/*, /api/v1/*, health/readiness.
    Metrics scrape endpoints may be excluded from public client contracts.
servers:
  - url: /
security:
  - cookieAuth: []
tags:
  - name: Status
    description: Liveness, readiness, and consolidated status.
  - name: Auth
    description: Session authentication and identity.
  - name: Account
    description: Signed-in user self-service.
  - name: Users
    description: Local user administration.
  - name: Admin
    description: Security policy, OIDC, and privileged admin actions.
  - name: Platform
    description: Compatibility, health narrative, dashboard, SSE, backup setup.
  - name: Benchmarks
    description: fio benchmark history and jobs.
  - name: Audit
    description: Durable audit event listing.
  - name: Inventory
    description: Provider-neutral Kubernetes and CSI inventory (from storage-v1).
  - name: Providers
    description: Managed-provider health and bounded typed resources (from storage-v1).
  - name: Context
    description: Resource relationships, workload impact, and drift (from storage-v1).
  - name: Operations
    description: Planned, durable, authorized storage workflows (from storage-v1).
  - name: Policy
    description: Admin-controlled runtime storage policy (from storage-v1).

paths:
  # --- Status / probes ---
  /healthz:
    $ref: ./paths/status.yaml#/~1healthz
  /readyz:
    $ref: ./paths/status.yaml#/~1readyz
  /api/v1/status:
    $ref: ./paths/status.yaml#/~1api~1v1~1status

  # --- Auth ---
  /auth/providers:
    $ref: ./paths/auth.yaml#/~1auth~1providers
  /auth/login:
    $ref: ./paths/auth.yaml#/~1auth~1login
  /auth/logout:
