          type: boolean
        available:
          type: boolean
        unavailableReason:
          type: string
    PlannedResource:
      type: object
      required:
        - apiVersion
        - kind
        - name
        - operation
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        namespace:
          type: string
        name:
          type: string
        operation:
          type: string
          enum:
            - server-side-apply
            - update
            - delete
        manifest:
          type: object
          additionalProperties: true
    OperationPlan:
      type: object
      required:
        - action
        - target
        - resources
        - checks
        - blastRadius
        - hash
        - challenge
        - challengeExpiresAt
        - observedAt
      properties:
        action:
          $ref: '#/components/schemas/Action'
        providerId:
          type: string
        target:
          $ref: '#/components/schemas/ResourceTarget'
        resources:
          type: array
          items:
            $ref: '#/components/schemas/PlannedResource'
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/ResourceTarget'
        checks:
          type: array
          items:
            type: object
            additionalProperties: true
        warnings:
          type: array
          items:
            type: string
        blastRadius:
          type: string
        hash:
          type: string
          pattern: ^[a-f0-9]{64}$
        policyVersion:
          type: string
          description: Observed runtime policy version bound into the challenge.
        challenge:
          type: string
        challengeExpiresAt:
          type: string
          format: date-time
        observedAt:
          type: string
          format: date-time
  requestBodies:
    OperationRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OperationRequest'
    OperationApproval:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OperationRequest'
