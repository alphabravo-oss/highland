        - $ref: '#/components/parameters/ContextLimit'
        - $ref: '#/components/parameters/Continue'
      responses:
        '200':
          description: Desired and runtime authorities remain separate in every drift record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriftReport'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/providers/{providerId}/capacity/forecast:
    get:
      tags:
        - Context
      operationId: getProviderCapacityForecast
      summary: Project one explicit capacity measure when sufficient fresh history exists
      parameters:
        - $ref: '#/components/parameters/ProviderId'
        - name: measure
          in: query
          required: true
          schema:
            type: string
        - name: horizon
          in: query
          schema:
            type: string
            example: 720h
      responses:
        '200':
          description: Bounded trend forecast or an explicit unavailable result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/providers/{providerId}/health:
    get:
      tags:
        - Providers
      operationId: getProviderHealth
      summary: Get provider health independently of readiness
      parameters:
        - $ref: '#/components/parameters/ProviderId'
      responses:
        '200':
          description: Provider health independent from global readiness.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderHealth'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/providers/{providerId}/resources/{kind}:
    get:
      tags:
        - Providers
      operationId: listProviderResources
      summary: List bounded typed resources for a provider
      parameters:
        - $ref: '#/components/parameters/ProviderId'
        - $ref: '#/components/parameters/Kind'
        - $ref: '#/components/parameters/parameters-Limit'
        - $ref: '#/components/parameters/Continue'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          $ref: '#/components/responses/ProviderResourcePage'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/providers/{providerId}/resources/{kind}/{id}:
    get:
      tags:
        - Providers
      operationId: getProviderResource
      summary: Get one bounded typed provider resource
      parameters:
        - $ref: '#/components/parameters/ProviderId'
        - $ref: '#/components/parameters/Kind'
        - name: id
          in: path
          required: true
          schema:
            type: string
            maxLength: 253
      responses:
        '200':
          description: Bounded typed provider resource.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/storage/actions:
    get:
      tags:
        - Operations
      operationId: listStorageActions
      summary: List approved storage actions and availability
      responses:
        '200':
          description: Machine-readable approved action and current availability matrix.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - writesEnabled
                  - portableProviderIds
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActionAvailability'
                  writesEnabled:
                    type: boolean
                  portableProviderIds:
                    type: array
                    description: Provider IDs currently authorized for portable PVC and snapshot workflows. A legacy wildcard is represented by `*`.
                    items:
                      type: string
                  policySource:
                    type: string
                  policyGeneration:
                    type: integer
                    format: int64
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/storage/plans:
    post:
      tags:
        - Operations
      operationId: planStorageOperation
      summary: Plan and preflight a storage action without mutation
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        $ref: '#/components/requestBodies/OperationRequest'
      responses:
        '200':
          description: Fresh server plan and short-lived confirmation challenge; no mutation occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationPlan'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/storage/operations:
    get:
      tags:
        - Operations
      operationId: listStorageOperations
      summary: List durable storage operations
      parameters:
        - name: provider
          in: query
          schema:
            type: string
            maxLength: 128
        - name: action
          in: query
          schema:
            type: string
            maxLength: 128
        - name: state
          in: query
          schema:
            type: string
            maxLength: 128
        - name: user
          in: query
          schema:
            type: string
            maxLength: 128
        - $ref: '#/components/parameters/parameters-Limit'
      responses:
        '200':
          description: Durable operation history; non-admins see only their operations.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StorageOperation'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/storage/operations/{operationId}:
    get:
      tags:
        - Operations
      operationId: getStorageOperation
      summary: Get one durable storage operation
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
            maxLength: 253
      responses:
        '200':
          description: Durable operation detail and timeline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageOperation'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/storage/restores:
    post:
      tags:
        - Operations
      operationId: restoreStorageSnapshot
      summary: Submit an approved snapshot restore
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        $ref: '#/components/requestBodies/OperationRequest'
      responses:
        '202':
          $ref: '#/components/responses/OperationAccepted'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/storage/clones:
    post:
      tags:
        - Operations
      operationId: cloneStorageClaim
      summary: Submit an approved PVC clone
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        $ref: '#/components/requestBodies/OperationRequest'
      responses:
        '202':
          $ref: '#/components/responses/OperationAccepted'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/providers/{providerId}/ceph/block-pools:
    post:
      tags:
        - Operations
      operationId: createCephBlockPool
      summary: Submit an approved replicated Ceph pool creation
      parameters:
        - $ref: '#/components/parameters/ProviderId'
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        $ref: '#/components/requestBodies/OperationRequest'
      responses:
        '202':
          $ref: '#/components/responses/OperationAccepted'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/providers/{providerId}/ceph/block-pools/{namespace}/{name}:
    delete:
      tags:
        - Operations
      operationId: deleteCephBlockPool
      summary: Submit an approved proven-empty Ceph pool deletion
      parameters:
        - $ref: '#/components/parameters/ProviderId'
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        $ref: '#/components/requestBodies/OperationApproval'
      responses:
        '202':
          $ref: '#/components/responses/OperationAccepted'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/providers/{providerId}/ceph/storage-classes:
    post:
      tags:
        - Operations
      operationId: createCephStorageClass
      summary: Submit an approved Ceph StorageClass creation
      description: actionId selects the approved RBD or CephFS StorageClass workflow.
      parameters:
        - $ref: '#/components/parameters/ProviderId'
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        $ref: '#/components/requestBodies/OperationRequest'
      responses:
        '202':
          $ref: '#/components/responses/OperationAccepted'
        default:
          $ref: '#/components/responses/responses-Error'
  /api/v1/providers/{providerId}/ceph/storage-classes/{name}:
    delete:
      tags:
        - Operations
      operationId: deleteCephStorageClass
      summary: Submit an approved Ceph StorageClass deletion
      parameters:
        - $ref: '#/components/parameters/ProviderId'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        $ref: '#/components/requestBodies/OperationApproval'
      responses:
        '202':
          $ref: '#/components/responses/OperationAccepted'
        default:
          $ref: '#/components/responses/responses-Error'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: highland_session
  parameters:
    Csrf:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
      description: Double-submit token paired with the signed session's CSRF cookie.
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    parameters-Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    ProviderId:
      name: providerId
      in: path
      required: true
      schema:
        type: string
        maxLength: 128
    Continue:
      name: continue
      in: query
      description: Opaque v1 continuation-token returned by the previous page.
      schema:
        type: string
        maxLength: 128
    Search:
      name: search
      in: query
      schema:
        type: string
        maxLength: 256
    Namespace:
      name: namespace
      in: path
      required: true
      schema:
        type: string
        maxLength: 63
        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
    Name:
      name: name
      in: path
      required: true
      schema:
        type: string
        maxLength: 253
    ContextLimit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 100
    Depth:
      name: depth
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 6
        default: 2
    Kind:
      name: kind
      in: path
      required: true
      schema:
        type: string
        maxLength: 128
  responses:
    Error:
      $ref: '#/components/responses/ErrorResponse'
    ErrorResponse:
      description: Stable machine-readable error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleError'
    Forbidden:
      description: Authenticated but not authorized for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleError'
    responses-Error:
      description: Stable machine-readable error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/schemas-ErrorEnvelope'
    DriverPage:
      description: Paginated drivers
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DriverPage'
    ClassPage:
      description: Paginated classes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ClassPage'
    ClaimPage:
      description: Paginated claims
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ClaimPage'
    OperationAccepted:
      description: Durable operation accepted. Replays of an equivalent active request return the same operation.
      headers:
        Location:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            required:
              - operation
            properties:
              operation:
                $ref: '#/components/schemas/StorageOperation'
              operationId:
                type: string
              duplicate:
                type: boolean
    VolumePage:
      description: Paginated volumes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VolumePage'
    SnapshotPage:
      description: Paginated snapshots
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SnapshotPage'
    AttachmentPage:
      description: Paginated attachments
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AttachmentPage'
    CapacityPage:
      description: Paginated capacities
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CapacityPage'
    EventPage:
      description: Paginated events
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EventPage'
    ProviderResourcePage:
      description: Paginated bounded provider resources.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/PageBase'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  schemas:
    APIError:
      type: object
      required:
        - code
        - message
        - retryable
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
        message:
          type: string
          description: Human-readable summary safe to show operators.
        details:
          type: object
          additionalProperties: true
        retryable:
          type: boolean
        requestId:
          type: string
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/APIError'
    SimpleError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    HealthzResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: highland-api
    ReadyzResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: ready | not_ready
          example: ready
        uptime:
          type: string
          description: Process uptime when ready.
        reason:
          type: string
          description: Present when status is not_ready.
        managerUrl:
          type: string
        providerId:
          type: string
        storage:
          type: object
          additionalProperties: true
    StatusResponse:
      type: object
      description: Consolidated versions, component health, and runtime facts for About/Status.
      additionalProperties: true
      properties:
        highland:
          type: object
          additionalProperties: true
        longhorn:
          type: object
          additionalProperties: true
        kubernetes:
          type: object
          additionalProperties: true
        compatibility:
          type: object
          additionalProperties: true
        components:
          type: object
          additionalProperties: true
        vendor:
          type: object
          additionalProperties: true
        storage:
          type: object
          additionalProperties: true
        storagePolicy:
          type: object
          additionalProperties: true
    Role:
      type: string
      enum:
        - viewer
        - operator
        - admin
    User:
      type: object
      required:
        - username
        - role
      properties:
        username:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        authSource:
          type: string
        mfaEnabled:
          type: boolean
        mfaSetupRequired:
          type: boolean
    AuthProvidersResponse:
      type: object
      required:
        - mode
        - local
        - oidc
      properties:
        mode:
          type: string
          description: Auth mode configured for this deployment.
        local:
          type: boolean
          description: Whether local username/password login is offered.
        oidc:
          type: boolean
          description: Whether OIDC/SSO is offered.
        oidcReady:
          type: boolean
          description: Whether an OIDC provider is currently configured and ready.
        oidcMock:
          type: boolean
        localAlways:
          type: boolean
        message:
          type: string
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    LoginSuccessResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'
    MFARequiredResponse:
      type: object
      required:
        - mfaRequired
        - challengeToken
      properties:
        mfaRequired:
          type: boolean
          const: true
        challengeToken:
          type: string
          description: Short-lived token required by POST /auth/mfa/verify.
    LogoutResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: logged_out
    MeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'
    AuditEvent:
      type: object
      required:
        - id
        - timestamp
        - username
        - role
        - action
        - result
      properties:
        schemaVersion:
          type: integer
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        username:
          type: string
        role:
          type: string
        action:
          type: string
        target:
          type: string
        method:
          type: string
        path:
          type: string
        result:
          type: string
          description: ok | denied | error
        sourceIp:
          type: string
        message:
          type: string
        operationId:
          type: string
        actionId:
          type: string
        providerId:
          type: string
        providerKind:
          type: string
        targetKind:
          type: string
        targetNamespace:
          type: string
        targetName:
          type: string
        targetUid:
          type: string
        planHash:
          type: string
        correlationId:
          type: string
        httpCorrelationId:
          type: string
        kubernetesCorrelationId:
          type: string
        cephCorrelationId:
          type: string
    AuditListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
    StorageAPIError:
      $ref: '#/components/schemas/schemas-APIError'
    StorageErrorEnvelope:
      $ref: '#/components/schemas/schemas-ErrorEnvelope'
    MFAVerifyRequest:
      type: object
      required:
        - challengeToken
        - code
      properties:
        challengeToken:
          type: string
        code:
          type: string
          description: TOTP or recovery code.
    OIDCMockLoginRequest:
      type: object
      properties:
        email:
          type: string
        role:
          $ref: '#/components/schemas/Role'
    SecurityPolicy:
      type: object
      additionalProperties: true
      properties:
        mfaMode:
          type: string
        passwordMinLength:
          type: integer
        passwordHistory:
          type: integer
        sessionMaxAge:
          type: string
    AccountResponse:
      type: object
      additionalProperties: true
      properties:
        username:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        authSource:
          type: string
        mfaEnabled:
          type: boolean
        mfaSetupRequired:
          type: boolean
        policy:
          $ref: '#/components/schemas/SecurityPolicy'
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
          writeOnly: true
        newPassword:
          type: string
          format: password
          writeOnly: true
    StatusOK:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    ChangeEmailRequest:
      type: object
      required:
        - currentPassword
        - email
      properties:
        currentPassword:
          type: string
          format: password
          writeOnly: true
        email:
          type: string
    MFAEnrollBeginRequest:
      type: object
      required:
        - currentPassword
      properties:
        currentPassword:
          type: string
          format: password
          writeOnly: true
    MFAEnrollBeginResponse:
      type: object
      additionalProperties: true
      properties:
        secret:
          type: string
          description: Base32 TOTP secret (enrollment only).
        otpauthUrl:
          type: string
        issuer:
          type: string
    MFAConfirmRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
    MFAConfirmResponse:
      type: object
      properties:
        status:
          type: string
        recoveryCodes:
          type: array
          items:
            type: string
          description: Shown once; never returned again.
    MFADisableRequest:
      type: object
      required:
        - currentPassword
        - code
      properties:
        currentPassword:
          type: string
          format: password
          writeOnly: true
        code:
          type: string
    PublicUser:
      type: object
      required:
        - username
        - role
      properties:
        username:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        disabled:
          type: boolean
        mfaEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
    UserListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PublicUser'
    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - role
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
        email:
          type: string
        password:
          type: string
          format: password
          writeOnly: true
        role:
          $ref: '#/components/schemas/Role'
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          format: password
          writeOnly: true
        role:
          $ref: '#/components/schemas/Role'
        disabled:
          type: boolean
        resetMfa:
          type: boolean
    PublicOIDCConfig:
      type: object
      additionalProperties: true
      properties:
        enabled:
          type: boolean
        issuerUrl:
          type: string
        clientId:
          type: string
        redirectUrl:
          type: string
        roleClaim:
          type: string
        secretSet:
          type: boolean
          description: Whether a client secret is stored (value never returned).
    OIDCUpdateRequest:
      type: object
      properties:
        enabled:
          type: boolean
        issuerUrl:
          type: string
        clientId:
          type: string
        clientSecret:
          type: string
          format: password
          writeOnly: true
          description: Write-only; omitted from all response schemas.
        redirectUrl:
          type: string
        roleClaim:
          type: string
    CephCredentialRevealResponse:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
          description: Revealed once to an authenticated admin; not a reusable API secret field for clients to store.
    CompatibilityResponse:
      type: object
      additionalProperties: true
      properties:
        highlandVersion:
          type: string
        managerUrl:
          type: string
        longhornSupport:
          type: array
          items:
            type: string
        mode:
          type: string
        enabled:
          type: boolean
        notes:
          type: string
    HealthNarrativeResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        generatedAt:
          type: string
          format: date-time
    PreflightResponse:
      type: object
      properties:
        checks:
          type: array
          items:
            type: object
            additionalProperties: true
    DashboardResponse:
      type: object
      additionalProperties: true
    CapacityResponse:
      type: object
      additionalProperties: true
    VolumeMetricsResponse:
      type: object
      additionalProperties: true
    BackupCredentialRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        namespace:
          type: string
        secretData:
          type: object
          additionalProperties:
            type: string
          writeOnly: true
    BackupCredentialResponse:
      type: object
      required:
        - name
        - namespace
      properties:
        name:
          type: string
        namespace:
          type: string
    Benchmark:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
        status:
          type: string
        providerId:
          type: string
        storageClass:
          type: string
    BenchmarkListResponse:
      type: object
      additionalProperties: true
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Benchmark'
