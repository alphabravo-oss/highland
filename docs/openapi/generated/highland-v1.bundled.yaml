openapi: 3.1.0
info:
  title: Highland API
  version: 0.4.0-preview
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  description: |
    Root OpenAPI 3.1 contract for the Highland public HTTP surface. Modular path and schema fragments live under docs/openapi/{paths,schemas}/. The storage control-plane remains fully specified in storage-v1.yaml and is composed here via $ref so both documents stay independently lintable.
    Public surface (ADR-0007 / DEC-12): /auth/*, /api/v1/*, health/readiness. Metrics scrape endpoints may be excluded from public client contracts.
servers:
  - url: /
security:
  - cookieAuth: []
tags:
  - name: Status
    description: Liveness, readiness, and consolidated status.
  - name: Auth
    description: Session authentication and identity.
  - name: Account
    description: Signed-in user self-service.
  - name: Users
    description: Local user administration.
  - name: Admin
    description: Security policy, OIDC, and privileged admin actions.
  - name: Platform
    description: Compatibility, health narrative, dashboard, SSE, backup setup.
  - name: Benchmarks
    description: fio benchmark history and jobs.
  - name: Audit
    description: Durable audit event listing.
  - name: Inventory
    description: Provider-neutral Kubernetes and CSI inventory (from storage-v1).
  - name: Providers
    description: Managed-provider health and bounded typed resources (from storage-v1).
  - name: Context
    description: Resource relationships, workload impact, and drift (from storage-v1).
  - name: Operations
    description: Planned, durable, authorized storage workflows (from storage-v1).
  - name: Policy
    description: Admin-controlled runtime storage policy (from storage-v1).
paths:
  /healthz:
    get:
      tags:
        - Status
      operationId: getHealthz
      summary: Liveness probe
      description: Unauthenticated process liveness. Always 200 when the process is up.
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthzResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /readyz:
    get:
      tags:
        - Status
      operationId: getReadyz
      summary: Readiness probe
      description: |
        Unauthenticated readiness. Returns 503 when required configuration, storage cache, Longhorn manager, or required providers are unavailable.
      security: []
      responses:
        '200':
          description: Service is ready to accept traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyzResponse'
        '503':
          description: Not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyzResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/status:
    get:
      tags:
        - Status
      operationId: getStatus
      summary: Consolidated status and version facts
      description: |
        Authenticated About/Status payload — Highland version, Kubernetes/Longhorn facts, component health, and optional storage/policy snapshots.
      responses:
        '200':
          description: Status snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/providers:
    get:
      tags:
        - Auth
      operationId: getAuthProviders
      summary: List available authentication providers
      description: Public endpoint describing whether local and/or OIDC login is offered.
      security: []
      responses:
        '200':
          description: Auth provider flags for the login UI.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProvidersResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      operationId: login
      summary: Local username/password login
      description: |
        Authenticates a local account and sets the session cookie on success. When MFA is enabled, returns 202 with a challenge token instead of a session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded; session cookie is set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '202':
          description: MFA verification required before a session is issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFARequiredResponse'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '403':
          description: Local login disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '429':
          description: Too many login attempts.
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '503':
          description: Identity service or login protection unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      operationId: logout
      summary: End the current session
      description: Deletes the server-side session (if present) and clears the session cookie.
      security: []
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/me:
    get:
      tags:
        - Auth
      operationId: getMe
      summary: Current authenticated principal
      description: Requires a valid session cookie.
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Missing or invalid session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/mfa/verify:
    post:
      tags:
        - Auth
      operationId: verifyMfa
      summary: Complete MFA challenge after local login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAVerifyRequest'
      responses:
        '200':
          description: MFA verified; session cookie set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '401':
          description: Invalid code or challenge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '429':
          description: Too many verification attempts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '503':
          description: Login protection unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/oidc/start:
    get:
      tags:
        - Auth
      operationId: startOidc
      summary: Begin OIDC authorization code flow
      description: Redirects the browser to the configured IdP. Returns 501 when OIDC is not ready.
      security: []
      responses:
        '302':
          description: Redirect to identity provider.
        '501':
          description: OIDC not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/oidc/callback:
    get:
      tags:
        - Auth
      operationId: oidcCallback
      summary: OIDC authorization code callback
      security: []
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect into the SPA with session cookie set.
        '400':
          description: Invalid OIDC callback parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/oidc/mock:
    post:
      tags:
        - Auth
      operationId: mockOidcLogin
      summary: Offline OIDC mock login (development only)
      description: Available only when HIGHLAND_OIDC_MOCK is enabled.
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OIDCMockLoginRequest'
      responses:
        '200':
          description: Mock session issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '403':
          description: Mock OIDC disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/account:
    get:
      tags:
        - Account
      operationId: getAccount
      summary: Current account profile and policy summary
      responses:
        '200':
          description: Account profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/account/password:
    put:
      tags:
        - Account
      operationId: changePassword
      summary: Change password for the signed-in local user
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOK'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/account/email:
    put:
      tags:
        - Account
      operationId: changeEmail
      summary: Change email for the signed-in local user
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeEmailRequest'
      responses:
        '200':
          description: Email changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOK'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/account/mfa/enroll:
    post:
      tags:
        - Account
      operationId: beginMfaEnrollment
      summary: Begin TOTP enrollment
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAEnrollBeginRequest'
      responses:
        '200':
          description: Enrollment secret and otpauth URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAEnrollBeginResponse'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/account/mfa/confirm:
    post:
      tags:
        - Account
      operationId: confirmMfaEnrollment
      summary: Confirm TOTP enrollment with a code
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAConfirmRequest'
      responses:
        '200':
          description: MFA enabled; recovery codes returned once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAConfirmResponse'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/account/mfa:
    delete:
      tags:
        - Account
      operationId: disableMfa
      summary: Disable TOTP for the signed-in user
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFADisableRequest'
      responses:
        '200':
          description: MFA disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOK'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/users:
    get:
      tags:
        - Users
      operationId: listUsers
      summary: List local users
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags:
        - Users
      operationId: createUser
      summary: Create a local user
      description: |
        Privileged mutation. When durable audit is configured, required admission fails closed with 503 if the audit sink cannot append.
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Required audit admission failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/users/{username}:
    parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
    put:
      tags:
        - Users
      operationId: updateUser
      summary: Update a local user (admin)
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOK'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Required audit admission failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags:
        - Users
      operationId: deleteUser
      summary: Delete a local user (admin)
      parameters:
        - $ref: '#/components/parameters/Csrf'
      responses:
        '200':
          description: User deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOK'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Required audit admission failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/auth/security-policy:
    get:
      tags:
        - Admin
      operationId: getSecurityPolicy
      summary: Get identity security policy
      responses:
        '200':
          description: Current security policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityPolicy'
        '403':
          $ref: '#/components/responses/Forbidden'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags:
        - Admin
      operationId: putSecurityPolicy
      summary: Update identity security policy
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityPolicy'
      responses:
        '200':
          description: Updated policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityPolicy'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Required audit admission failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/auth/oidc-config:
    get:
      tags:
        - Admin
      operationId: getOidcConfig
      summary: Get public OIDC runtime configuration
      description: Secret fields are never returned; secretSet indicates whether a client secret is stored.
      responses:
        '200':
          description: Public OIDC config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicOIDCConfig'
        '403':
          $ref: '#/components/responses/Forbidden'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags:
        - Admin
      operationId: putOidcConfig
      summary: Update OIDC runtime configuration
      description: clientSecret is write-only and never appears in responses.
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OIDCUpdateRequest'
      responses:
        '200':
          description: Updated public OIDC config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicOIDCConfig'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Required audit admission failed or runtime unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/admin/providers/rook-ceph/dashboard-credential/reveal:
    post:
      tags:
        - Admin
      operationId: revealCephDashboardCredential
      summary: Reveal Ceph Dashboard admin credential
      description: |
        Admin-only. Returns the dashboard password once after an explicit action. Response must not be cached. Audited. Does not include Kubernetes Secret metadata beyond the revealed username/password.
      parameters:
        - $ref: '#/components/parameters/Csrf'
      responses:
        '200':
          description: Credential revealed.
          headers:
            Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CephCredentialRevealResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Feature disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '503':
          description: HTTP 503.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/compatibility:
    get:
      tags:
        - Platform
      operationId: getCompatibility
      summary: Compatibility and version narrative
      responses:
        '200':
          description: Compatibility payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompatibilityResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/health:
    get:
      tags:
        - Platform
      operationId: getHealthNarrative
      summary: Operator-facing health narrative items
      responses:
        '200':
          description: Health items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthNarrativeResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/preflight:
    get:
      tags:
        - Platform
      operationId: getPreflight
      summary: Static preflight checks Highland can evaluate without cluster admin
      responses:
        '200':
          description: Preflight check list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreflightResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/dashboard:
    get:
      tags:
        - Platform
      operationId: getDashboardAggregate
      summary: Aggregated dashboard payload
      responses:
        '200':
          description: Dashboard aggregate (shape may expand with providers).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/capacity:
    get:
      tags:
        - Platform
      operationId: getCapacityPlanning
      summary: Capacity planning summary
      responses:
        '200':
          description: Capacity planning payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/volumes/{name}/metrics:
    get:
      tags:
        - Platform
      operationId: getVolumeMetrics
      summary: Per-volume metrics summary for the UI
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Volume metrics payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeMetricsResponse'
        '404':
          description: HTTP 404.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/events/stream:
    get:
      tags:
        - Platform
      operationId: streamEvents
      summary: Server-Sent Events change stream
      description: |
        Authenticated SSE stream of cache invalidation / change events. Reconnect with Last-Event-ID when supported by the client.
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/backup-credential:
    post:
      tags:
        - Platform
      operationId: createBackupCredential
      summary: Create backup target credentials Secret
      description: Request contains secret material (write-only); response never echoes secret values.
      parameters:
        - $ref: '#/components/parameters/Csrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupCredentialRequest'
      responses:
        '201':
          description: Credential secret created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupCredentialResponse'
        '400':
          description: HTTP 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '403':
          $ref: '#/components/responses/Forbidden'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/benchmarks:
    get:
      tags:
        - Benchmarks
      operationId: listBenchmarks
      summary: List benchmark runs
      responses:
        '200':
          description: Benchmark list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenchmarkListResponse'
        default:
